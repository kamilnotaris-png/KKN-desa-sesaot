; PHP-FPM pool khusus untuk Peta Wisata Digital Desa Sesaot.
; Terisolasi dari pool LegalVerse & website FH (socket & log terpisah)
; sekaligus dituning minim resource karena trafik aplikasi ini rendah
; (peta publik yang diakses wisatawan sudah lepas ke GitHub Pages,
; pool ini cuma melayani admin panel yang dipakai Pokdarwis sesekali).
;
; Cek dulu versi PHP yang aktif di VPS: php -v
; Lalu taruh file ini di /etc/php/{VERSI}/fpm/pool.d/kkn-sesaot.conf
; (mis. /etc/php/8.3/fpm/pool.d/kkn-sesaot.conf)
;
; Setelah itu:
;   systemctl restart php{VERSI}-fpm
; dan pastikan nginx-kkn-sesaot.conf mengarah ke socket yang sama.

[kkn-sesaot]
user = www-data
group = www-data

listen = /run/php/php-kkn-sesaot.sock
listen.owner = www-data
listen.group = www-data
listen.mode = 0660

; pm=ondemand: worker baru spawn hanya saat ada request, mati lagi setelah
; idle - RAM idle hampir 0, cocok untuk trafik jarang seperti admin panel ini.
pm = ondemand
pm.max_children = 3
pm.process_idle_timeout = 10s
pm.max_requests = 200

php_admin_value[error_log] = /var/log/php-fpm/kkn-sesaot-error.log
php_admin_flag[log_errors] = on

php_admin_value[upload_max_filesize] = 20M
php_admin_value[post_max_size] = 20M
