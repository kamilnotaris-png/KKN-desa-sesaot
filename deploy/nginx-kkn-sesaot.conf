# Nginx vhost untuk Peta Wisata Digital Desa Sesaot
# Domain: wisatasesaot.my.id (dibeli terpisah, independen dari FH Unizar)
#
# Taruh di /etc/nginx/sites-available/kkn-sesaot, lalu:
#   ln -s /etc/nginx/sites-available/kkn-sesaot /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx
#
# Setelah A record DNS wisatasesaot.my.id mengarah ke IP VPS ini, jalankan:
#   certbot --nginx -d wisatasesaot.my.id -d www.wisatasesaot.my.id
# certbot otomatis menambahkan blok server 443 (HTTPS) + redirect dari
# blok 80 di bawah ini, tidak perlu edit manual file ini lagi setelahnya.

server {
    listen 80;
    listen [::]:80;
    server_name wisatasesaot.my.id www.wisatasesaot.my.id;
    root /var/www/kkn-sesaot/public;

    index index.php;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    charset utf-8;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    # Aset statis (termasuk build Vite, manifest.json, sw.js, ikon PWA).
    # PENTING: fallback ke index.php kalau file fisiknya tidak ada -
    # Livewire menyajikan livewire.js secara dinamis lewat Laravel
    # (bukan file statis di public/), jadi TIDAK BOLEH langsung 404
    # kalau tidak ketemu file-nya, harus diteruskan ke PHP dulu.
    location ~* \.(?:css|js|png|jpg|jpeg|gif|svg|ico|webp|woff2?)$ {
        expires 30d;
        access_log off;
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Service worker tidak boleh cache lama di edge, supaya update terdeteksi cepat
    location = /sw.js {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    error_page 404 /index.php;

    location ~ \.php$ {
        fastcgi_pass unix:/run/php/php-kkn-sesaot.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    client_max_body_size 20M;
}
