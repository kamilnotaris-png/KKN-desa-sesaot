# Nginx vhost untuk Peta Wisata Digital Desa Sesaot
#
# Domain belum ditentukan - untuk sementara app ini dibuka lewat PORT
# KHUSUS (8091), diakses langsung via IP VPS (http://103.93.132.225:8091),
# supaya tidak bentrok dengan vhost LegalVerse/FH yang sudah pakai
# port 80/443 dengan server_name masing-masing.
#
# PENTING: selama masih di port 8091 tanpa HTTPS, service worker (mode
# offline PWA) TIDAK akan aktif di browser sungguhan - browser hanya
# mengizinkan Service Worker di HTTPS atau di localhost. Peta, admin
# panel, dan semua fitur lain tetap normal, cuma mode offline-nya baru
# aktif setelah domain asli + certbot terpasang (lihat DEPLOY.md).
#
# Taruh di /etc/nginx/sites-available/kkn-sesaot, lalu:
#   ln -s /etc/nginx/sites-available/kkn-sesaot /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx
#   ufw allow 8091/tcp   # kalau firewall ufw aktif di VPS
#
# Begitu domain sudah dipilih & DNS-nya siap: ganti "listen 8091;" jadi
# "listen 80;", isi server_name dengan domainnya, lalu jalankan certbot
# seperti langkah 7 di DEPLOY.md.

server {
    listen 8091;
    listen [::]:8091;
    server_name _;
    root /var/www/kkn-sesaot/public;

    index index.php;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    charset utf-8;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    # Aset statis (termasuk build Vite, manifest.json, sw.js, ikon PWA)
    location ~* \.(?:css|js|png|jpg|jpeg|gif|svg|ico|webp|woff2?)$ {
        expires 30d;
        access_log off;
        try_files $uri =404;
    }

    # Service worker tidak boleh cache lama di edge, supaya update terdeteksi cepat
    location = /sw.js {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    error_page 404 /index.php;

    location ~ \.php$ {
        fastcgi_pass unix:/run/php/php-kkn-sesaot.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    client_max_body_size 20M;
}
